# AzaLoop 0.1.1 Configuration
version: "0.1.1"

project:
  name: azaloop
  root: .

loop:
  max_iterations: 50
  # R10/R11: 每个阶段（maker→checker→optimizer）的最大相位轮数。
  # 真实工程需多轮「写码→测试→修复」，从硬编码 5 改为可配置，默认 20；
  # 优化/重构类项目建议 30~50 以容纳更多修复迭代。
  max_stage_iterations: 30
  deadlock_threshold: 3
  hard_stop_on_security: true
  # 外层循环（按 PRD 故事批量推进 board）：当前客户端开启全自动需置 true
  outer_enabled: true
  # 全自动脊柱：open 阶段也必须能调 aza_loop / aza_auto（见 STAGE_TOOL_GROUPS）
  full_auto: true

# 无人值守：与 MCP env AZA_AUTO_APPROVE_PRD=true 对齐
autonomy:
  level: L3
  auto_approve_prd: true

memory:
  enabled: true
  episodic_max: 100
  compression_threshold: 50

quality:
  gates:
    lint: true
    test: true
    regression: true
    security: true
    acceptance: true
