# AzaLoop Client Capability Matrix (v14 — +6 capabilities)
# Defines which capabilities each AI client supports natively.
# v14-P7.4 extension: webhook, cron, event-bus, feature-flag, secrets, metrics.
#
# Capability semantics:
#   hooks         — client fires pre/post tool events
#   rules         — client reads rules from a system-prompt file
#   mcp           — client registers an MCP server
#   skills        — client has a native skill invocation API
#   native_loop   — client runs an agentic loop natively
#   stop_hook     — client can interrupt a running loop
#   webhook       — client supports inbound HTTP webhooks
#   cron          — client can run scheduled tasks
#   event_bus     — client participates in the azaloop event bus
#   feature_flag  — client can read remote feature flags
#   secrets       — client can fetch secrets from a vault
#   metrics       — client emits structured metrics

clients:
  cursor:
    tier: T1
    capabilities:
      hooks: true
      rules: true
      mcp: true
      skills: true
      native_loop: true
      stop_hook: true
      webhook: true
      cron: false
      event_bus: true
      feature_flag: false
      secrets: false
      metrics: true

